<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A33"/>
      <stop offset="100%" style="stop-color:#FF5500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Borda laranja sutil -->
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Haltere - barra central -->
  <rect x="156" y="238" width="200" height="36" rx="18" fill="url(#orangeGrad)"/>

  <!-- Haltere - disco esquerdo externo -->
  <rect x="96" y="196" width="40" height="120" rx="14" fill="url(#orangeGrad)" filter="url(#glow)"/>
  <!-- Haltere - disco esquerdo interno -->
  <rect x="140" y="212" width="22" height="88" rx="10" fill="url(#orangeGrad)"/>

  <!-- Haltere - disco direito interno -->
  <rect x="350" y="212" width="22" height="88" rx="10" fill="url(#orangeGrad)"/>
  <!-- Haltere - disco direito externo -->
  <rect x="376" y="196" width="40" height="120" rx="14" fill="url(#orangeGrad)" filter="url(#glow)"/>

  <!-- Ponto de luz reflexo -->
  <ellipse cx="148" cy="218" rx="8" ry="4" fill="white" opacity="0.25" transform="rotate(-30 148 218)"/>
  <ellipse cx="364" cy="218" rx="8" ry="4" fill="white" opacity="0.25" transform="rotate(-30 364 218)"/>

  <!-- Texto GYM -->
  <text x="256" y="388" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="url(#orangeGrad)" text-anchor="middle" letter-spacing="12">GYM</text>

  <!-- Sublinhado laranja decorativo -->
  <rect x="176" y="398" width="160" height="3" rx="2" fill="url(#orangeGrad)" opacity="0.6"/>
</svg>
